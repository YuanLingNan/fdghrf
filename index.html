<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语录随机生成器</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="logo">💬</div>
                <h1>语录随机生成器</h1>
                <p>点击下方按钮获取随机智慧语录</p>
            </div>

            <div class="quote-area" id="quoteArea">
                <div class="quote-icon">📖</div>
                <p class="quote-text" id="quoteText">点击下方按钮开始探索...</p>
                <p class="quote-author" id="quoteAuthor"></p>
            </div>

            <div class="controls">
                <button class="generate-btn" id="generateBtn">
                    <span class="btn-icon">🔄</span>
                    获取新语录
                </button>
                <button class="copy-btn" id="copyBtn">
                    <span class="btn-icon">📋</span>
                    复制语录
                </button>
            </div>

            <div class="stats">
                <span id="quoteCount">已生成 0 条语录</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
